<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wanderlust | Maintenance</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Minimal inline styles for fast loading, independence from main architecture in case of breakage */
        :root {
            --color-terracotta: #D36C4A;
            --color-sand: #F3EBE1;
            --color-text: #333;
            --font-main: 'Inter', sans-serif;
        }
        body { margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; background-color: var(--color-sand); font-family: var(--font-main); color: var(--color-text); text-align: center; }
        .box { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 500px; width: 90%; }
        h1 { margin-top: 0; color: var(--color-terracotta); font-size: 24px; }
        p { color: #666; line-height: 1.6; }
        .icon { font-size: 48px; color: var(--color-terracotta); margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="box">
        <i class="fa-solid fa-wrench icon"></i>
        <h1>We'll be right back!</h1>
        <p>Wanderlust is currently undergoing scheduled maintenance to upgrade our booking systems. We aim to be back online within 2 hours.</p>
        <p style="font-size: 14px; margin-top: 30px; color: #999;">Need urgent assistance? <br> Reach us at <a href="mailto:support@wanderlust-rv.com" style="color: var(--color-terracotta);">support@wanderlust-rv.com</a> or call 1-800-WANDER-0</p>
    </div>

</body>
</html>
