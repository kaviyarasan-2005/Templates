<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wanderlust | Forgot Password</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/rtl.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <link rel="stylesheet" href="css/responsive.css">
    
    <style>
        .auth-layout { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--color-warm-sand-light); padding: var(--spacing-4); }
        .auth-card { background: var(--color-white); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); padding: var(--spacing-10); width: 100%; max-width: 500px; }
    </style>
</head>
<body>

    <div class="auth-layout">
        <div class="auth-card animate-fade-in">
            <div class="u-text-center u-mb-6">
                <a href="index.html" class="na-logo u-mb-4" style="justify-content: center;">
                    <i class="fa-solid fa-caravan u-color-terracotta"></i> <span>Wanderlust</span>
                </a>
                <h2>Reset Password</h2>
                <p class="u-color-text-muted">Enter your email and we'll send you a link to get back into your account.</p>
            </div>

            <form class="validate-form">
                <div class="form-group u-mb-6">
                    <input type="email" class="form-control" id="email" placeholder=" " required>
                    <label class="form-label" for="email">Email Address</label>
                    <div class="form-error">Valid email required</div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Send Reset Link</button>
            </form>

            <div class="u-text-center u-mt-8" style="margin-top: var(--spacing-8);">
                <a href="login.html" class="btn btn-ghost" style="width: 100%;"><i class="fa-solid fa-arrow-left"></i> Back to Login</a>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div class="modal-overlay" id="successModal">
        <div class="modal">
            <div class="modal-body u-text-center">
                <i class="fa-solid fa-circle-check fa-4x u-color-terracotta u-mb-4"></i>
                <h3>Check your email</h3>
                <p>We've sent a password reset link if the account exists.</p>
                <button class="btn btn-primary modal-close" style="margin-top: var(--spacing-4);">Close</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
