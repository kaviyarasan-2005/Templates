<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — Intérieur</title>
    <meta name="description" content="The page you're looking for doesn't exist or has been moved.">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%232C3E2D'/%3E%3Ctext x='50%25' y='55%25' text-anchor='middle' dominant-baseline='middle' fill='%23F5F1E8' font-family='serif' font-size='20' font-weight='bold'%3EI%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/animations.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">
    <style>
        body { overflow: hidden; }

        .error-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: var(--space-8);
            position: relative;
            overflow: hidden;
        }

        /* Floating room elements - decorative */
        .floating-elements {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        .float-el {
            position: absolute;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            opacity: 0.15;
            animation: floatDrift 20s ease-in-out infinite;
        }
        .float-el:nth-child(1) { width: 200px; height: 160px; top: 10%; left: 5%; animation-delay: 0s; animation-duration: 22s; }
        .float-el:nth-child(2) { width: 120px; height: 120px; top: 60%; left: 15%; animation-delay: -5s; animation-duration: 18s; border-radius: 50%; }
        .float-el:nth-child(3) { width: 280px; height: 200px; top: 20%; right: 5%; animation-delay: -8s; animation-duration: 25s; }
        .float-el:nth-child(4) { width: 100px; height: 100px; bottom: 15%; right: 20%; animation-delay: -12s; animation-duration: 20s; border-radius: 50%; }
        .float-el:nth-child(5) { width: 180px; height: 80px; bottom: 30%; left: 35%; animation-delay: -3s; animation-duration: 24s; }

        @keyframes floatDrift {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-20px) rotate(2deg); }
            50% { transform: translateY(10px) rotate(-1deg); }
            75% { transform: translateY(-15px) rotate(1.5deg); }
        }

        .error-content { position: relative; z-index: 1; }

        /* Large stylised 404 */
        .error-code {
            font-family: var(--font-editorial);
            font-size: clamp(8rem, 20vw, 18rem);
            font-weight: 400;
            line-height: 1;
            color: transparent;
            -webkit-text-stroke: 2px var(--border-strong);
            letter-spacing: -0.04em;
            margin-bottom: var(--space-2);
            position: relative;
            user-select: none;
        }
        /* Accent fill on the middle '0' */
        .error-code span {
            -webkit-text-stroke: 2px var(--terracotta);
            position: relative;
        }
        .error-code span::after {
            content: '0';
            position: absolute;
            left: 0;
            top: 0;
            color: rgba(224, 122, 95, 0.08);
            -webkit-text-stroke: 0;
        }

        .error-title {
            font-family: var(--font-editorial);
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            color: var(--text-primary);
            margin-bottom: var(--space-4);
            letter-spacing: -0.01em;
        }

        .error-desc {
            color: var(--text-secondary);
            font-size: var(--text-lg);
            max-width: 460px;
            margin: 0 auto var(--space-8);
            line-height: 1.6;
        }

        .error-actions {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-4);
            flex-wrap: wrap;
        }

        /* Search mini-form */
        .error-search {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-full);
            padding: var(--space-2) var(--space-4);
            max-width: 360px;
            width: 100%;
            margin: var(--space-8) auto 0;
            transition: border-color 0.3s;
        }
        .error-search:focus-within { border-color: var(--terracotta); }
        .error-search input {
            border: none;
            background: transparent;
            outline: none;
            flex: 1;
            color: var(--text-primary);
            font-size: var(--text-sm);
            padding: var(--space-2);
        }
        .error-search button {
            background: none;
            border: none;
            color: var(--text-tertiary);
            cursor: pointer;
            display: flex;
            transition: color 0.3s;
        }
        .error-search button:hover { color: var(--terracotta); }

        /* Helpful links */
        .helpful-links {
            margin-top: var(--space-12);
            display: flex;
            justify-content: center;
            gap: var(--space-8);
            flex-wrap: wrap;
        }
        .helpful-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--space-2);
            color: var(--text-secondary);
            text-decoration: none;
            font-size: var(--text-sm);
            font-weight: 500;
            transition: color 0.3s, transform 0.3s;
        }
        .helpful-link:hover { color: var(--terracotta); transform: translateY(-4px); }
        .helpful-link__icon {
            width: 48px; height: 48px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: center;
            transition: border-color 0.3s, background 0.3s;
        }
        .helpful-link:hover .helpful-link__icon {
            border-color: var(--terracotta);
            background: rgba(224, 122, 95, 0.08);
        }

        @media (max-width: 640px) {
            .helpful-links { gap: var(--space-6); }
            .error-actions { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="error-page">
        <!-- Decorative floating outlines -->
        <div class="floating-elements">
            <div class="float-el"></div>
            <div class="float-el"></div>
            <div class="float-el"></div>
            <div class="float-el"></div>
            <div class="float-el"></div>
        </div>

        <div class="error-content dissolve-in">
            <div class="error-code">4<span>0</span>4</div>
            <h1 class="error-title">This room doesn't exist yet.</h1>
            <p class="error-desc">The page you're looking for may have been moved, renamed, or is still being designed. Let's get you back on track.</p>

            <div class="error-actions">
                <a href="../index.html" class="btn btn--primary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    Back to Home
                </a>
                <a href="portfolio.html" class="btn btn--secondary">View Portfolio</a>
            </div>

            <form class="error-search" onsubmit="event.preventDefault()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-tertiary);flex-shrink:0"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" placeholder="Search for what you need...">
                <button type="submit" aria-label="Search">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                </button>
            </form>

            <nav class="helpful-links" aria-label="Helpful links">
                <a href="services.html" class="helpful-link">
                    <div class="helpful-link__icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg></div>
                    Services
                </a>
                <a href="blog.html" class="helpful-link">
                    <div class="helpful-link__icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></div>
                    Journal
                </a>
                <a href="contact.html" class="helpful-link">
                    <div class="helpful-link__icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></div>
                    Contact
                </a>
                <a href="pricing.html" class="helpful-link">
                    <div class="helpful-link__icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
                    Pricing
                </a>
            </nav>
        </div>
    </div>

    <script src="../assets/js/modules/theme.js"></script>
</body>
</html>
