<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Intérieur</title>
    <meta name="description" content="Sign in to your Intérieur account to access your design projects.">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%232C3E2D'/%3E%3Ctext x='50%25' y='55%25' text-anchor='middle' dominant-baseline='middle' fill='%23F5F1E8' font-family='serif' font-size='20' font-weight='bold'%3EI%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/animations.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">
    <style>
        body { background: var(--bg-surface); }
        .auth-layout { display: flex; min-height: 100vh; }
        
        .auth-form-side { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: var(--space-8); position: relative; }
        .auth-form-container { width: 100%; max-width: 400px; }
        
        .auth-header { text-align: center; margin-bottom: var(--space-8); }
        .auth-logo { margin-bottom: var(--space-8); display: inline-flex; align-items: center; gap: var(--space-2); font-family: var(--font-editorial); font-size: var(--text-2xl); font-weight: 600; color: var(--text-primary); text-decoration: none; }
        .auth-header h1 { font-size: var(--text-3xl); margin-bottom: var(--space-2); }
        .auth-header p { color: var(--text-secondary); font-size: var(--text-sm); }
        
        .social-auth { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); margin-bottom: var(--space-6); }
        .btn-social { background: var(--bg-primary); border: 1px solid var(--border-color); color: var(--text-primary); font-weight: 500; }
        .btn-social:hover { background: var(--bg-elevated); border-color: var(--border-strong); }
        
        .divider { display: flex; align-items: center; text-align: center; margin: var(--space-6) 0; color: var(--text-tertiary); font-size: var(--text-xs); text-transform: uppercase; letter-spacing: 0.1em; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border-color); }
        .divider:not(:empty)::before { margin-inline-end: .5em; }
        .divider:not(:empty)::after { margin-inline-start: .5em; }

        .auth-form { display: flex; flex-direction: column; gap: var(--space-5); }
        .auth-options { display: flex; justify-content: space-between; align-items: center; font-size: var(--text-sm); margin-top: -8px; }
        .auth-options a { color: var(--terracotta); text-decoration: none; font-weight: 500; }
        .auth-options a:hover { text-decoration: underline; }
        
        .custom-checkbox { display: flex; align-items: center; gap: var(--space-2); cursor: pointer; color: var(--text-secondary); }
        .custom-checkbox input { position: absolute; opacity: 0; cursor: pointer; height: 0; width: 0; }
        .checkmark { height: 18px; width: 18px; background-color: var(--bg-primary); border: 1px solid var(--border-strong); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; }
        .custom-checkbox:hover input ~ .checkmark { border-color: var(--terracotta); }
        .custom-checkbox input:checked ~ .checkmark { background-color: var(--terracotta); border-color: var(--terracotta); }
        .checkmark::after { content: ""; display: none; width: 4px; height: 8px; border: solid white; border-width: 0 2px 2px 0; transform: rotate(45deg); margin-bottom: 2px; }
        .custom-checkbox input:checked ~ .checkmark::after { display: block; }

        .auth-footer { margin-top: var(--space-8); text-align: center; font-size: var(--text-sm); color: var(--text-secondary); }
        .auth-footer a { color: var(--text-primary); font-weight: 600; text-decoration: none; transition: color 0.3s; }
        .auth-footer a:hover { color: var(--terracotta); }

        .auth-image-side { flex: 1.2; position: relative; overflow: hidden; display: none; background: #000; }
        .auth-image-side img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; animation: scaleSlow 30s linear infinite alternate; }
        .auth-quote { position: absolute; bottom: var(--space-12); inset-inline-start: var(--space-12); inset-inline-end: var(--space-12); color: #fff; z-index: 1; }
        .auth-quote blockquote { font-family: var(--font-editorial); font-size: var(--text-2xl); font-style: italic; margin-bottom: var(--space-4); text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .auth-quote cite { font-size: var(--text-sm); font-style: normal; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; display: flex; align-items: center; gap: var(--space-2); }
        .auth-quote cite::before { content: ''; width: 30px; height: 1px; background: var(--burnished-gold); }
        
        .back-link { position: absolute; top: var(--space-8); inset-inline-start: var(--space-8); display: flex; align-items: center; gap: var(--space-2); color: var(--text-secondary); font-size: var(--text-sm); font-weight: 600; text-decoration: none; transition: color 0.3s; }
        .back-link:hover { color: var(--text-primary); }

        /* Password Toggle specifics */
        .pwd-toggle-btn { position: absolute; inset-inline-end: 1rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-tertiary); cursor: pointer; padding: 0; display: flex; transition: color 0.3s; }
        .pwd-toggle-btn:hover { color: var(--text-primary); }

        @keyframes scaleSlow { from { transform: scale(1); } to { transform: scale(1.1); } }
        @media (min-width: 1024px) { .auth-image-side { display: block; } }
    </style>
</head>
<body>
    <div class="auth-layout">
        <section class="auth-form-side">
            <a href="javascript:history.back()" class="back-link">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Back
            </a>

            <div class="auth-form-container reveal">
                <div class="auth-header">
                    <a href="../index.html" class="auth-logo">
                        <svg width="28" height="28" viewBox="0 0 32 32"><rect width="32" height="32" rx="6" fill="#2C3E2D"/><text x="50%" y="55%" text-anchor="middle" dominant-baseline="middle" fill="#F5F1E8" font-family="serif" font-size="18" font-weight="bold">I</text></svg>
                        Intérieur
                    </a>
                    <h1>Welcome back</h1>
                    <p>Enter your details to access your dashboard.</p>
                </div>

                <div class="social-auth">
                    <button class="btn btn--social btn--base w-full" style="justify-content:center">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032s2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.503,2.988,15.139,2,12.545,2C7.021,2,2.543,6.477,2.543,12s4.478,10,10.002,10c8.396,0,10.249-7.85,9.426-11.748L12.545,10.239z"/></svg>
                        Google
                    </button>
                    <button class="btn btn--social btn--base w-full" style="justify-content:center">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.379.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.161 22 16.416 22 12c0-5.523-4.477-10-10-10z"/></svg>
                        GitHub
                    </button>
                </div>

                <div class="divider">Or continue with email</div>

                <form class="auth-form" action="dashboard.html">
                    <div class="form-group">
                        <input type="email" class="form-control" id="email" required placeholder=" ">
                        <label for="email" class="form-label">Email address</label>
                    </div>
                    
                    <div class="form-group">
                        <input type="password" class="form-control" id="password" required placeholder=" " style="padding-inline-end:40px">
                        <label for="password" class="form-label">Password</label>
                        <button type="button" class="pwd-toggle-btn" aria-label="Toggle password visibility">
                            <svg class="eye-on" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            <svg class="eye-off" style="display:none" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                        </button>
                    </div>

                    <div class="auth-options">
                        <label class="custom-checkbox">
                            <input type="checkbox" checked>
                            <span class="checkmark"></span>
                            Remember for 30 days
                        </label>
                        <a href="#">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn btn--primary btn--lg w-full mt-2" style="justify-content:center">Sign In</button>
                </form>

                <div class="auth-footer">
                    Don't have an account? <a href="register.html">Create an account</a>
                </div>
            </div>
        </section>

        <section class="auth-image-side">
            <img src="https://images.unsplash.com/photo-1600210491892-03d54c0aaf87?w=1200&q=80" alt="Interior Design Detail">
            <div class="auth-quote">
                <blockquote>"Design is not just what it looks like and feels like. Design is how it works."</blockquote>
                <cite>Bringing your vision to life.</cite>
            </div>
        </section>
    </div>

    <!-- Minimal script for auth toggle -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const pwdInput = document.getElementById('password');
            const toggleBtn = document.querySelector('.pwd-toggle-btn');
            const eyeOn = document.querySelector('.eye-on');
            const eyeOff = document.querySelector('.eye-off');

            if(toggleBtn && pwdInput) {
                toggleBtn.addEventListener('click', () => {
                    const type = pwdInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    pwdInput.setAttribute('type', type);
                    if(type === 'text') {
                        eyeOn.style.display = 'none';
                        eyeOff.style.display = 'block';
                    } else {
                        eyeOn.style.display = 'block';
                        eyeOff.style.display = 'none';
                    }
                });
            }
        });
    </script>
</body>
</html>
