<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Aurelia Gallery</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/favicons/favicon-32x32.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{gold:'#D4AF37',burgundy:'#722F37',copper:'#B87333'},fontFamily:{heading:['Playfair Display','Georgia','serif'],body:['Inter','system-ui','sans-serif']}}}}</script>
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    /* Critical Mobile Fixes */
    @media (max-width: 640px) {
      .navbar__logo-suffix { display: none !important; }
      .navbar__actions .btn--primary, 
      .navbar__actions #theme-toggle, 
      .navbar__actions #rtl-toggle { display: none !important; }
      .navbar__inner { padding-inline: 16px !important; }
      .navbar__logo { font-size: 1.1rem !important; }
      .navbar__actions { gap: 0 !important; }
      html, body { overflow-x: hidden !important; width: 100% !important; position: relative !important; }
      * { max-width: 100vw !important; }
    }
  </style>
</head>
<body style="display:flex;align-items:center;justify-content:center;height:100vh;background:var(--color-bg);text-align:center;overflow:hidden;position:relative;">
  
  <!-- Minimalist abstract bg -->
  <svg style="position:absolute;inset:0;width:100%;height:100%;opacity:0.05;z-index:0;pointer-events:none;" xmlns="http://www.w3.org/2000/svg">
    <circle cx="20%" cy="80%" r="40%" fill="var(--color-primary)" />
    <circle cx="80%" cy="20%" r="30%" fill="var(--color-secondary)" />
  </svg>

  <div style="position:relative;z-index:1;padding:40px;">
    <h1 style="font-family:var(--font-heading);font-size:clamp(6rem,15vw,10rem);line-height:1;margin-bottom:16px;color:var(--color-primary);text-shadow: 4px 4px 0 rgba(0,0,0,0.1);">404</h1>
    <h2 style="font-size:2rem;margin-bottom:16px;color:var(--color-text);">Canvas Not Found</h2>
    <p style="color:var(--color-text-secondary);max-width:400px;margin:0 auto 32px;line-height:1.6;">It seems the artwork you're looking for has been moved or doesn't exist in our current collection.</p>
    <a href="home-main.html" class="btn btn--primary">Return to Gallery Overview</a>
  </div>
</body>
</html>
