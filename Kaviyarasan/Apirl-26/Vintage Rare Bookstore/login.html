<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Vintage Rare Bookstore</title>
  <meta name="description" content="Sign in to your Vintage Rare Bookstore account to access your collection, orders, and services.">
  <link rel="icon" type="image/svg+xml" href="assets/images/favicons/favicon.svg">
  <meta name="theme-color" content="#8B4513">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <link rel="stylesheet" href="assets/css/dark-mode.css">
  <style>
    /* NO NAVBAR, NO FOOTER — Full viewport, no scroll */
    html, body { overflow: hidden; height: 100%; margin: 0; }
    .auth-wrapper { display: grid; grid-template-columns: 60% 40%; height: 100vh; max-height: 100vh; }
    .auth-left { position: relative; overflow: hidden; }
    .auth-left__bg { position: absolute; inset: 0; background: url('assets/images/backgrounds/hero-library.png') center/cover; }
    .auth-left__overlay { position: absolute; inset: 0; background: linear-gradient(160deg, rgba(26,20,16,0.7) 0%, rgba(93,58,26,0.6) 100%); }
    .auth-left__content { position: relative; z-index: 1; height: 100%; display: flex; flex-direction: column; justify-content: flex-end; padding: var(--space-3xl); }
    .auth-left__quote { font-family: var(--font-heading); font-size: 1.75rem; font-style: italic; color: rgba(255,255,255,0.9); line-height: 1.4; margin-bottom: var(--space-md); }
    .auth-left__attribution { font-family: var(--font-ui); font-size: 0.875rem; color: rgba(212,175,55,0.85); }
    .auth-right { display: flex; align-items: center; justify-content: center; background: var(--bg-primary); overflow-y: auto; padding: var(--space-xl); }
    .auth-card { width: 100%; max-width: 420px; }
    .auth-logo { text-align: center; margin-bottom: var(--space-2xl); }
    .auth-logo a { display: inline-flex; flex-direction: column; align-items: center; gap: var(--space-sm); text-decoration: none; }
    .auth-logo svg { width: 64px; height: 64px; }
    .auth-logo-name { font-family: var(--font-heading); font-size: 1.25rem; font-weight: 700; color: var(--primary); }
    .auth-title { font-family: var(--font-heading); font-size: 1.875rem; font-weight: 700; color: var(--text-primary); text-align: center; margin-bottom: var(--space-sm); }
    .auth-subtitle { text-align: center; color: var(--text-muted); font-size: 0.9375rem; margin-bottom: var(--space-2xl); }
    .social-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-sm); margin-bottom: var(--space-md); }
    .auth-form-group { margin-bottom: var(--space-md); }
    .auth-pw-row { position: relative; }
    .auth-pw-row .form-input { padding-right: 44px; }
    .form-options { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-lg); font-family: var(--font-ui); font-size: 0.875rem; }
    .checkbox-wrap { display: flex; align-items: center; gap: var(--space-sm); color: var(--text-secondary); cursor: pointer; }
    .checkbox-wrap input { width: 16px; height: 16px; accent-color: var(--accent); }
    .forgot-link { color: var(--accent-hover); font-weight: 600; transition: color var(--transition-base); }
    .forgot-link:hover { color: var(--primary); }
    .auth-footer { text-align: center; margin-top: var(--space-lg); font-family: var(--font-ui); font-size: 0.9375rem; color: var(--text-muted); }
    .auth-footer a { color: var(--accent-hover); font-weight: 600; }
    .auth-footer a:hover { color: var(--primary); }
    /* Theme toggle (top right corner only) */
    .auth-topbar { position: fixed; top: var(--space-md); right: var(--space-md); z-index: 100; display: flex; gap: var(--space-sm); }
    @media (max-width: 768px) {
      html, body { overflow: auto; }
      .auth-wrapper { grid-template-columns: 1fr; }
      .auth-left { display: none; }
      .auth-right { min-height: 100vh; height: auto; }
    }
  </style>
</head>
<body>
  <!-- Top controls only -->
  <div class="auth-topbar">
    <button id="theme-toggle" class="nav-icon-btn" aria-label="Toggle theme" style="background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--border-radius);">
      <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg>
    </button>
  </div>

  <div class="auth-wrapper">
    <!-- Left: Library image -->
    <div class="auth-left" role="presentation">
      <div class="auth-left__bg"></div>
      <div class="auth-left__overlay"></div>
      <div class="auth-left__content">
        <blockquote class="auth-left__quote">"A room without books is like a body without a soul."</blockquote>
        <p class="auth-left__attribution">— Marcus Tullius Cicero</p>
      </div>
    </div>

    <!-- Right: Login card -->
    <div class="auth-right">
      <div class="auth-card">
        <div class="auth-logo">
          <!-- Logo as link to home, no "Back to Home" text -->
          <a href="index.html" aria-label="Return to Vintage Rare Bookstore home">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" aria-hidden="true">
              <rect width="64" height="64" rx="12" fill="#8B4513"/>
              <rect x="11" y="10" width="30" height="44" rx="3" fill="#D4AF37"/>
              <rect x="14" y="13" width="24" height="38" rx="2" fill="#FDF8F0"/>
              <rect x="17" y="21" width="18" height="2.5" rx="1.25" fill="#8B4513"/>
              <rect x="17" y="27" width="14" height="2.5" rx="1.25" fill="#8B4513"/>
              <rect x="17" y="33" width="16" height="2.5" rx="1.25" fill="#8B4513"/>
              <rect x="43" y="13" width="10" height="38" rx="2" fill="#5D3A1A"/>
            </svg>
            <span class="auth-logo-name">Vintage Rare Bookstore</span>
          </a>
        </div>

        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Sign in to access your collection and services</p>

        <!-- Social Login -->
        <div class="social-btns">
          <button class="social-btn social-btn--google" type="button" aria-label="Continue with Google">
            <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Google
          </button>
          <button class="social-btn social-btn--facebook" type="button" aria-label="Continue with Facebook">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2" aria-hidden="true"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            Facebook
          </button>
          <button class="social-btn social-btn--apple" type="button" aria-label="Continue with Apple">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
            Apple
          </button>
        </div>

        <div class="divider"><span>or continue with email</span></div>

        <form id="login-form" novalidate>
          <div class="auth-form-group">
            <label for="login-email" class="form-label">Email Address <span class="required">*</span></label>
            <input type="email" id="login-email" name="email" class="form-input" placeholder="you@example.com" required autocomplete="email">
          </div>
          <div class="auth-form-group">
            <label for="login-password" class="form-label">Password <span class="required">*</span></label>
            <div class="auth-pw-row" style="position:relative">
              <input type="password" id="login-password" name="password" class="form-input" placeholder="Enter your password" required autocomplete="current-password">
              <button type="button" class="pw-toggle" aria-label="Show password">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <div class="form-options">
            <label class="checkbox-wrap">
              <input type="checkbox" id="remember-me" name="remember"> Remember me
            </label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>
          <button type="submit" class="btn btn-accent btn-full btn-lg form-submit" id="login-btn">Sign In</button>
        </form>

        <p class="auth-footer">
          Don't have an account? <a href="register.html">Create one →</a>
        </p>
      </div>
    </div>
  </div>

  <script src="assets/js/main.js" defer></script>
  <script src="assets/js/forms.js" defer></script>
</body>
</html>
