<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account – Antiquarian Rare Books</title>
    <meta name="description" content="Join the Antiquarian Rare Books Collector's Registry. Create your account to access exclusive acquisitions, member events, and expert curation services.">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/favicons/favicon-32.png">
    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={darkMode:['class','[data-theme="dark"]'],theme:{extend:{colors:{brand:'var(--color-primary)',brandSecondary:'var(--color-secondary)',brandAccent:'var(--color-accent)',brandBg:'var(--color-bg-main)',brandCard:'var(--color-bg-card)',brandFooter:'var(--color-bg-footer)',brandText:'var(--color-text-main)',brandTextMuted:'var(--color-text-muted)',brandTextSub:'var(--color-text-sub)',borderNav:'var(--color-border)'},fontFamily:{heading:'var(--font-heading)',body:'var(--font-body)'}}}}</script>
    <link rel="stylesheet" href="../assets/css/main.css"><link rel="stylesheet" href="../assets/css/rtl.css">
</head>
<body class="bg-brandSecondary text-white min-h-screen flex flex-col" style="background-color:var(--color-secondary);">

<!-- Standalone topbar -->
<div class="auth-topbar">
  <a href="home-1.html" class="auth-brand" aria-label="Return to Antiquarian Rare Books Home">
    <i class="fa-solid fa-book-open text-xl" style="color:var(--color-accent);"></i>
    <span class="auth-brand-name">Antiquarian</span>
  </a>
  <div class="flex items-center gap-2">
    <button class="theme-toggle-btn w-9 h-9 flex items-center justify-center rounded-full border border-white/20 text-white hover:border-white/50 transition-colors" aria-label="Toggle theme"><i class="theme-icon fa-solid fa-moon text-sm"></i></button>
    <button class="dir-toggle-btn w-9 h-9 flex items-center justify-center rounded-full border border-white/20 text-white hover:border-white/50 transition-colors" aria-label="Toggle direction"><i class="fa-solid fa-globe text-sm"></i></button>
  </div>
</div>

<main class="auth-main flex-1 flex items-stretch min-h-[calc(100vh-60px)]" id="main-content">

  <!-- LEFT IMAGE -->
  <div class="auth-image-panel hidden lg:flex" role="presentation">
    <img src="../assets/images/hero/hero_manuscripts.jpg" alt="Rare illuminated manuscripts on scholar's desk" class="auth-bg-image">
    <div class="auth-image-overlay absolute inset-0"></div>
    <div class="auth-image-quote relative z-10">
      <i class="fa-solid fa-quote-left text-4xl mb-4" style="color:var(--color-accent); opacity:0.7;"></i>
      <blockquote class="text-xl italic font-heading leading-relaxed mb-6" style="color:#FFFFF0;">"Books are the mirrors of the soul."</blockquote>
      <p style="color:rgba(245,245,220,0.6); font-size:0.85rem;">— Virginia Woolf</p>
      <div class="mt-10 space-y-3">
        <div class="flex items-center gap-3 text-sm" style="color:rgba(245,245,220,0.8);"><i class="fa-solid fa-check-circle" style="color:var(--color-accent);"></i> First access to new acquisitions</div>
        <div class="flex items-center gap-3 text-sm" style="color:rgba(245,245,220,0.8);"><i class="fa-solid fa-check-circle" style="color:var(--color-accent);"></i> Expert curator consultations</div>
        <div class="flex items-center gap-3 text-sm" style="color:rgba(245,245,220,0.8);"><i class="fa-solid fa-check-circle" style="color:var(--color-accent);"></i> Personal collection catalogue</div>
      </div>
    </div>
  </div>

  <!-- RIGHT FORM -->
  <div class="auth-form-panel flex items-center justify-center p-8 w-full lg:w-[520px] flex-shrink-0">
    <div class="w-full max-w-[420px]">

      <div class="text-center mb-8">
        <div class="w-14 h-14 mx-auto rounded-full flex items-center justify-center mb-4" style="background:rgba(212,175,55,0.15); border:1px solid rgba(212,175,55,0.3);">
          <i class="fa-solid fa-user-plus text-xl" style="color:var(--color-accent);"></i>
        </div>
        <h1 class="font-heading font-bold text-2xl mb-1" style="color:var(--color-text-main);">Join the Registry</h1>
        <p class="text-sm" style="color:var(--color-text-sub);">Create your Collector's account today</p>
      </div>

      <form id="register-form" class="space-y-4" novalidate>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="form-label" for="reg-first">First Name</label><input id="reg-first" type="text" class="form-field" placeholder="First" required data-error-required="Enter first name."><div id="reg-first-error" class="form-error"></div></div>
          <div><label class="form-label" for="reg-last">Last Name</label><input id="reg-last" type="text" class="form-field" placeholder="Last" required data-error-required="Enter last name."><div id="reg-last-error" class="form-error"></div></div>
        </div>
        <div>
          <label class="form-label" for="reg-email">Email Address</label>
          <input id="reg-email" type="email" class="form-field" placeholder="your@email.com" required autocomplete="email">
          <div id="reg-email-error" class="form-error"></div>
        </div>
        <div>
          <label class="form-label" for="register-password">Password</label>
          <div class="relative">
            <input id="register-password" type="password" class="form-field w-full" placeholder="Create a strong password" required data-min-length="8" autocomplete="new-password">
            <button type="button" class="absolute end-3 top-1/2 -translate-y-1/2 text-brandTextSub hover:text-brand transition-colors" onclick="this.previousElementSibling.type=this.previousElementSibling.type==='password'?'text':'password';" aria-label="Toggle password visibility">
              <i class="fa-solid fa-eye text-sm"></i>
            </button>
          </div>
          <!-- Password strength bar -->
          <div class="mt-2">
            <div class="flex justify-between items-center mb-1"><span class="text-xs" style="color:var(--color-text-sub);">Password Strength</span><span id="strength-label" class="text-xs font-semibold" style="color:var(--color-text-sub);"></span></div>
            <div class="w-full rounded-full h-1.5" style="background:var(--color-border);"><div id="strength-fill" class="h-1.5 rounded-full transition-all duration-300" style="width:0%; background:#dc3545;"></div></div>
          </div>
          <div id="register-password-error" class="form-error"></div>
        </div>
        <div>
          <label class="form-label" for="reg-confirm">Confirm Password</label>
          <input id="reg-confirm" type="password" class="form-field" placeholder="Re-enter password" required data-match="register-password" autocomplete="new-password">
          <div id="reg-confirm-error" class="form-error"></div>
        </div>
        <div>
          <label class="form-label" for="reg-plan">Membership Plan</label>
          <select id="reg-plan" class="form-field"><option value="collector">Collector (£29/month)</option><option value="scholar" selected>Scholar (£79/month)</option><option value="institution">Institution (£249/month)</option></select>
        </div>

        <div class="flex items-start gap-2.5 pt-1">
          <input id="register-terms" type="checkbox" class="w-4 h-4 mt-0.5 flex-shrink-0 accent-brand">
          <label for="register-terms" class="text-xs leading-relaxed" style="color:var(--color-text-sub);">I agree to the <a href="#" class="text-brand hover:text-brandAccent underline">Terms of Trade</a> and <a href="#" class="text-brand hover:text-brandAccent underline">Privacy Paradigm</a></label>
        </div>

        <button type="submit" class="btn-primary w-full py-3.5">
          <i class="fa-solid fa-user-plus"></i> Create Account
        </button>

        <div class="social-divider"><span>or sign up with</span></div>
        <div class="grid grid-cols-2 gap-3">
          <button type="button" class="social-btn"><i class="fa-brands fa-google text-[#4285F4]"></i> Google</button>
          <button type="button" class="social-btn"><i class="fa-brands fa-facebook-f text-[#1877F2]"></i> Facebook</button>
        </div>
        <p class="text-center text-sm" style="color:var(--color-text-sub);">Already a member? <a href="login.html" class="font-semibold text-brand hover:text-brandAccent transition-colors">Sign in</a></p>
      </form>

    </div>
  </div>
</main>

<script src="../assets/js/main.js"></script><script src="../assets/js/forms.js"></script>
</body>
</html>
