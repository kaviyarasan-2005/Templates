<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon — Ember & Brew</title>
  <meta name="description" content="Something exciting is brewing. Sign up to be the first to know when Ember & Brew launches something new.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{font-size:16px;height:100%}
    body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;height:100%;overflow:hidden;color:#F5F1E8;line-height:1.5}

    .coming-soon{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;overflow:hidden}
    .coming-soon__bg{position:absolute;inset:0}
    .coming-soon__bg img{width:100%;height:100%;object-fit:cover}
    .coming-soon__overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(15,13,11,.92) 0%,rgba(61,40,23,.85) 50%,rgba(111,78,55,.75) 100%)}
    .coming-soon__content{position:relative;z-index:2;max-width:600px;padding:40px 24px}

    .coming-soon__brand{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:48px}
    .coming-soon__brand-icon{width:48px;height:48px;background:#6F4E37;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.4rem;font-family:'Playfair Display',serif;font-weight:700}
    .coming-soon__brand-text{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:#F5F1E8}
    .coming-soon__brand-text span{color:#E85D04}

    .coming-soon__title{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3.5rem);font-weight:700;line-height:1.1;margin-bottom:16px}
    .coming-soon__title span{background:linear-gradient(135deg,#D4A574,#E85D04);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .coming-soon__desc{color:rgba(245,241,232,.7);font-size:1.0625rem;margin-bottom:40px;max-width:480px;margin-inline:auto;line-height:1.7}

    /* Countdown */
    .countdown{display:flex;justify-content:center;gap:24px;margin-bottom:48px}
    .countdown__item{text-align:center}
    .countdown__number{font-family:'Playfair Display',serif;font-size:clamp(2rem,6vw,3.5rem);font-weight:700;color:#D4A574;line-height:1;display:block}
    .countdown__label{font-size:.75rem;text-transform:uppercase;letter-spacing:.15em;color:rgba(245,241,232,.5);margin-top:4px}
    .countdown__sep{font-family:'Playfair Display',serif;font-size:2rem;color:rgba(245,241,232,.2);padding-top:8px}

    /* Newsletter */
    .coming-soon__form{display:flex;max-width:420px;margin:0 auto 40px;gap:8px}
    .coming-soon__form input{flex:1;padding:12px 16px;border:1.5px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);border-radius:8px;color:#F5F1E8;font-size:.875rem;outline:none;transition:border-color .2s}
    .coming-soon__form input::placeholder{color:rgba(245,241,232,.4)}
    .coming-soon__form input:focus{border-color:#D4A574}
    .coming-soon__form button{padding:12px 24px;background:#E85D04;color:#fff;border:none;border-radius:8px;font-size:.875rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
    .coming-soon__form button:hover{background:#C44D03;transform:translateY(-1px)}

    /* Social */
    .coming-soon__socials{display:flex;justify-content:center;gap:12px}
    .coming-soon__social{width:44px;height:44px;border-radius:50%;border:1px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.6);font-size:.9rem;transition:all .2s;text-decoration:none}
    .coming-soon__social:hover{background:rgba(255,255,255,.1);color:#fff;border-color:rgba(255,255,255,.3);transform:translateY(-2px)}

    /* Particles */
    .particle{position:absolute;width:4px;height:4px;background:rgba(212,165,116,.3);border-radius:50%;animation:float-particle linear infinite}
    @keyframes float-particle{0%{transform:translateY(100vh) rotate(0deg);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-100vh) rotate(720deg);opacity:0}}

    @media(max-width:480px){
      .countdown{gap:12px}
      .coming-soon__form{flex-direction:column}
    }
  </style>
</head>
<body>

  <div class="coming-soon">
    <div class="coming-soon__bg">
      <img src="https://images.unsplash.com/photo-1447933601403-0c6688de566e?w=1920&q=80" alt="Coffee beans in warm light" loading="eager">
    </div>
    <div class="coming-soon__overlay"></div>

    <!-- Floating particles -->
    <div class="particle" style="left:10%;animation-duration:12s;animation-delay:0s;width:3px;height:3px"></div>
    <div class="particle" style="left:25%;animation-duration:15s;animation-delay:2s;width:5px;height:5px"></div>
    <div class="particle" style="left:45%;animation-duration:10s;animation-delay:4s"></div>
    <div class="particle" style="left:65%;animation-duration:18s;animation-delay:1s;width:6px;height:6px"></div>
    <div class="particle" style="left:80%;animation-duration:14s;animation-delay:3s"></div>
    <div class="particle" style="left:92%;animation-duration:16s;animation-delay:5s;width:3px;height:3px"></div>

    <div class="coming-soon__content">
      <div class="coming-soon__brand">
        <div class="coming-soon__brand-icon">E</div>
        <div class="coming-soon__brand-text">Ember <span>&</span> Brew</div>
      </div>

      <h1 class="coming-soon__title">Something <span>Extraordinary</span> Is Brewing</h1>
      <p class="coming-soon__desc">We're crafting a new experience for coffee lovers. Be the first to know when we launch — exclusive early access and special offers await.</p>

      <!-- Countdown -->
      <div class="countdown" id="countdown">
        <div class="countdown__item">
          <span class="countdown__number" id="cd-days">14</span>
          <div class="countdown__label">Days</div>
        </div>
        <span class="countdown__sep">:</span>
        <div class="countdown__item">
          <span class="countdown__number" id="cd-hours">08</span>
          <div class="countdown__label">Hours</div>
        </div>
        <span class="countdown__sep">:</span>
        <div class="countdown__item">
          <span class="countdown__number" id="cd-mins">42</span>
          <div class="countdown__label">Minutes</div>
        </div>
        <span class="countdown__sep">:</span>
        <div class="countdown__item">
          <span class="countdown__number" id="cd-secs">15</span>
          <div class="countdown__label">Seconds</div>
        </div>
      </div>

      <!-- Newsletter -->
      <form class="coming-soon__form" aria-label="Get notified" onsubmit="event.preventDefault();this.querySelector('button').textContent='Subscribed ✓';this.querySelector('input').value=''">
        <input type="email" placeholder="Enter your email for early access" required aria-label="Email address">
        <button type="submit">Notify Me</button>
      </form>

      <!-- Social Links -->
      <div class="coming-soon__socials">
        <a href="#" class="coming-soon__social" aria-label="Facebook">f</a>
        <a href="#" class="coming-soon__social" aria-label="Instagram">ig</a>
        <a href="#" class="coming-soon__social" aria-label="Twitter">𝕏</a>
        <a href="#" class="coming-soon__social" aria-label="YouTube">▶</a>
      </div>
    </div>
  </div>

  <script>
    /* Countdown timer — 14 days from now */
    (function(){
      const target=new Date();
      target.setDate(target.getDate()+14);
      function update(){
        const now=new Date();
        const diff=target-now;
        if(diff<=0)return;
        const d=Math.floor(diff/(1000*60*60*24));
        const h=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
        const m=Math.floor((diff%(1000*60*60))/(1000*60));
        const s=Math.floor((diff%(1000*60))/1000);
        document.getElementById('cd-days').textContent=String(d).padStart(2,'0');
        document.getElementById('cd-hours').textContent=String(h).padStart(2,'0');
        document.getElementById('cd-mins').textContent=String(m).padStart(2,'0');
        document.getElementById('cd-secs').textContent=String(s).padStart(2,'0');
      }
      update();
      setInterval(update,1000);
    })();
  </script>
</body>
</html>
