<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Artora</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

<div style="min-height:100vh;display:grid;grid-template-columns:1fr 1fr">
  <div style="background:var(--color-primary);display:flex;align-items:center;justify-content:center;padding:var(--space-8)">
    <div style="max-width:400px;width:100%;color:#fff;text-align:center">
      <a href="index.html" class="nav-logo" style="justify-content:center;margin-bottom:var(--space-8)"><div class="nav-logo-mark"><span style="font-family:var(--font-display);font-size:.9rem;color:var(--color-accent)">A</span></div>ARTORA</a>
      <img src="https://images.unsplash.com/photo-1531913223931-b0d3198229ee?w=600&q=80" alt="Gallery" loading="eager" style="width:100%;aspect-ratio:4/3;object-fit:cover;margin-bottom:var(--space-6)">
      <blockquote style="border-left:none;padding:0;font-size:var(--text-xl);color:rgba(255,255,255,.7)">"Art enables us to find ourselves and lose ourselves at the same time."</blockquote>
      <p style="margin-top:var(--space-3);font-size:var(--text-xs);letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.3)">— Thomas Merton</p>
    </div>
  </div>
  <div style="display:flex;align-items:center;justify-content:center;padding:var(--space-8);background:var(--color-bg)">
    <div style="max-width:380px;width:100%">
      <p class="eyebrow">Welcome Back</p>
      <h1 style="font-size:var(--text-4xl);margin-block:var(--space-4)">Sign In</h1>
      <p style="color:var(--text-secondary);margin-bottom:var(--space-6)">Don't have an account? <a href="register.html" style="color:var(--color-accent)">Create one →</a></p>
      <form data-validate style="display:flex;flex-direction:column;gap:var(--space-4)">
        <div class="form-group" style="margin:0"><label class="form-label" for="email">Email</label><input type="email" id="email" class="form-control" placeholder="your@email.com" required></div>
        <div class="form-group" style="margin:0">
          <div style="display:flex;justify-content:space-between"><label class="form-label" for="pw">Password</label><a href="#" style="font-size:var(--text-xs);color:var(--color-accent)">Forgot password?</a></div>
          <input type="password" id="pw" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="justify-content:center">Sign In</button>
      </form>
      <div class="divider-text" style="margin-block:var(--space-5)">or continue with</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3)">
        <button class="btn btn-outline" style="justify-content:center;gap:var(--space-2)"><svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg> Google</button>
        <button class="btn btn-outline" style="justify-content:center;gap:var(--space-2)"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg> Facebook</button>
      </div>
    </div>
  </div>
</div>
<script src="js/main.js" type="module"></script>
</body></html>
