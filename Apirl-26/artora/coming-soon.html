<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon — Artora</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

<div style="min-height:100vh;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden">
  <div style="position:absolute;inset:0">
    <img src="https://images.unsplash.com/photo-1531913223931-b0d3198229ee?w=1600&q=80" alt="" style="width:100%;height:100%;object-fit:cover">
    <div style="position:absolute;inset:0;background:rgba(10,10,10,.85)"></div>
  </div>
  <div style="position:relative;z-index:1;text-align:center;color:#fff;padding:var(--space-6);max-width:600px">
    <a href="index.html" class="nav-logo" style="justify-content:center;margin-bottom:var(--space-8)"><div class="nav-logo-mark"><span style="font-family:var(--font-display);font-size:.9rem;color:var(--color-accent)">A</span></div>ARTORA</a>
    <p class="eyebrow" style="color:var(--color-accent)">Something exceptional is coming</p>
    <h1 style="color:#fff;font-size:clamp(2.5rem,6vw,5rem);margin-block:var(--space-5)">Opening Soon</h1>
    <p style="color:rgba(255,255,255,.6);font-size:var(--text-lg);margin-bottom:var(--space-8)">We are preparing something extraordinary. Be the first to know when we open.</p>
    <div class="countdown" style="justify-content:center;gap:var(--space-7);margin-bottom:var(--space-8)" data-countdown="2026-09-01T10:00:00">
      <div class="countdown-unit"><span class="countdown-value" data-days>--</span><span class="countdown-label" style="color:rgba(255,255,255,.4)">Days</span></div>
      <div class="countdown-unit"><span class="countdown-value" data-hours>--</span><span class="countdown-label" style="color:rgba(255,255,255,.4)">Hours</span></div>
      <div class="countdown-unit"><span class="countdown-value" data-mins>--</span><span class="countdown-label" style="color:rgba(255,255,255,.4)">Mins</span></div>
      <div class="countdown-unit"><span class="countdown-value" data-secs>--</span><span class="countdown-label" style="color:rgba(255,255,255,.4)">Secs</span></div>
    </div>
    <form class="newsletter-form input-group" style="max-width:400px;margin:0 auto">
      <input type="email" class="form-control" placeholder="Enter your email" required style="background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);color:#fff">
      <button type="submit" class="btn btn-accent">Notify Me</button>
    </form>
    <div class="social-links" style="justify-content:center;margin-top:var(--space-6)">
      <a href="#" class="social-link"><svg width="16" height="16"><use href="assets/icons/sprite.svg#icon-instagram"/></svg></a>
      <a href="#" class="social-link"><svg width="16" height="16"><use href="assets/icons/sprite.svg#icon-twitter"/></svg></a>
    </div>
  </div>
</div>
<script src="js/main.js" type="module"></script>
</body></html>
