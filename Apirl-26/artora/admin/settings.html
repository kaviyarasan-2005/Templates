    <div style="background:var(--color-surface);border:1px solid var(--color-border);padding:var(--space-6);margin-bottom:var(--space-5)" id="general">
      <h3 style="margin-bottom:var(--space-5)">General Settings</h3>
      <div class="form-group"><label class="form-label">Gallery Name</label><input type="text" class="form-control" value="Artora Gallery"></div>

      <button class="btn btn-accent">Save Changes</button>
    </div>
    <div style="background:var(--color-surface);border:1px solid var(--color-border);padding:var(--space-6)" id="theme">
