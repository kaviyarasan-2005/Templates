<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Artora</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:var(--space-6);background:var(--color-bg)">
  <div style="max-width:560px">
    <p style="font-family:var(--font-display);font-size:clamp(6rem,20vw,12rem);font-weight:300;line-height:1;color:var(--color-border);letter-spacing:-.04em">404</p>
    <p class="eyebrow" style="margin-top:var(--space-4)">Page Not Found</p>
    <h1 style="font-size:clamp(1.8rem,4vw,2.5rem);margin-block:var(--space-4)">The work you're looking for<br>has moved or doesn't exist</h1>
    <p style="color:var(--text-secondary);margin-bottom:var(--space-8)">Like an artwork that's been loaned to another institution, this page isn't where you expected it. Let us help you find what you're looking for.</p>
    <div style="display:flex;gap:var(--space-4);justify-content:center;flex-wrap:wrap">
      <a href="index.html" class="btn btn-primary btn-arrow">Return Home <svg width="16" height="16"><use href="assets/icons/sprite.svg#icon-arrow-right"/></svg></a>
      <a href="exhibitions.html" class="btn btn-outline">View Exhibitions</a>
    </div>
    <div style="margin-top:var(--space-8);padding-top:var(--space-6);border-top:1px solid var(--color-border)">
      <div class="search-bar" style="max-width:400px;margin:0 auto"><svg width="18" height="18"><use href="assets/icons/sprite.svg#icon-search"/></svg><input type="search" placeholder="Search the site…"></div>
    </div>
  </div>
</div>
<script src="js/main.js" type="module"></script>
</body></html>
